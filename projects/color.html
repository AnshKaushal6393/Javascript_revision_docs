<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .btn {
        padding: 10px 20px;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
      #primary {
        background-color: blue;
      }
      #secondary {
        background-color: gray;
      }
      #success {
        background-color: green;
      }
      #danger {
        background-color: red;
      }
    </style>
    <script src="color.js" defer></script>
  </head>
  <body>
    <h1>Color Changer</h1>
    <span>
      <button class="btn" id="primary">Primary</button>
      <button class="btn" id="secondary">Secondary</button>
      <button class="btn" id="success">Success</button>
      <button class="btn" id="danger">Danger</button>
      <button class="btn" id="warning">Warning</button>
    </span>

    <h2>Click on any button to change background color</h2>
  </body>
</html>
